      Monthly Enterprise Subscription - Standard 1      2,499.00    2,499.00
                                                  Subtotal    2,499.00
                                                  VAT (12%)     299.88
                                                  TOTAL PHP  2,798.88
    expected_output: |
      {"merchant": "CloudSaaS Professional Services", "date": "2026-05-02", "amount": 2798.88, "currency": "PHP", "category": "Software", "justification": ""}
