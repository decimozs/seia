name: seia-extraction
version: "1.0.0"
description: >
  Tests the SEIA extraction agent (extract_node). Input is raw OCR text from
  receipts/invoices. Expected output is the correct structured expense JSON.
  System prompt matches app/prompts/extraction_agent_prompt.md.
interaction_type: single_turn
tags: [seia, extraction, financial]
author: seia
created_at: "2026-06-05"
updated_at: "2026-06-05"
test_cases:
  - id: ext-001
    description: "Approved invoice — Jollibee, PHP 431.20, Meals, no justification"
    system_prompt: &extractor_prompt |
      # ROLE
      You are a High-Precision Financial Data Extractor. Your goal is to transform raw OCR text from receipts and invoices into a structured JSON format for RAG-based auditing.

      # EXTRACTION RULES
      1. **Merchant**: Identify the primary vendor name. Look for the largest text at the top or "Business Name" fields.
      2. **Date**: Extract in `YYYY-MM-DD` format. If multiple dates exist, use the "Transaction Date" or "Date of Issue." Default to null if not found.
      3. **Amount**: Extract the final "Total" or "Amount Due" as a float. Remove commas and currency symbols.
      4. **Currency**: Use ISO 3-letter codes (e.g., PHP, USD).
      5. **Category**: Map the expense strictly to: [Travel, Meals, Supplies, Utilities, Software, Others].
      6. **Justification**:
         - **CRITICAL**: ONLY extract text that explicitly describes the business purpose or reason for the purchase (e.g., "Client Lunch," "Server Hosting").
         - Do NOT extract merchant slogans, footers, or "Thank you" notes.
         - If no explicit business purpose is found in the text, return an empty string "".

      # OUTPUT FORMAT
      Return ONLY a valid JSON object. Do not include markdown headers or conversational text.
      {
        "merchant": "string",
        "date": "YYYY-MM-DD" | null,
        "amount": float,
        "currency": "string",
        "category": "string",
        "justification": "string"
      }
    input: |
      OFFICIAL RECEIPT
      DATE OF ISSUE: 2026-05-01
      INVOICE NUMBER: OR-772910
      CATEGORY: Meals
      CURRENCY: PHP
      BILL TO: TechAudit Corp Philippines, BGC, Taguig City
      Merchant: Jollibee Foods Corporation, Ground Floor, Estancia Mall, Pasig City
      TIN: 000-123-456-000

      DESCRIPTION                  QTY   UNIT PRICE   AMOUNT
      Chickenjoy Solo Meal          1      155.00      155.00
      Jolly Spaghetti Family Pan    1      230.00      230.00
                                            Subtotal    385.00
                                            VAT (12%)    46.20
                                            TOTAL PHP   431.20
    expected_output: |
      {"merchant": "Jollibee Foods Corporation", "date": "2026-05-01", "amount": 431.20, "currency": "PHP", "category": "Meals", "justification": ""}
    actual_output: null
    metrics: [factuality, format]
    tags: [approved, meals, happy-path]
    weight: 1.0

