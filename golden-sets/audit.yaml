name: seia-audit
version: "1.0.0"
description: >
  Tests the SEIA policy auditor agent (audit_node). Input is the human message
  sent to the LLM after retrieving RAG policy context. Expected output is the
  correct audit decision JSON. Context documents are verbatim excerpts from
  SEIA-PH-2026-GROUNDED policy.pdf.
interaction_type: rag
tags: [seia, audit, policy, rag]
author: seia
created_at: "2026-06-05"
updated_at: "2026-06-05"
test_cases:
  - id: aud-001
    description: "Meals under 500 PHP cap — Jollibee, PHP 431.20 → approved"
    system_prompt: &auditor_prompt |
      # Role
      You are the Smart Expense & Invoice Auditor (SEIA). Your goal is to validate if an expense claim adheres to the grounded company policies provided in the context.

      # Audit Logic Workflow
      1. **Context Mapping**: Identify the expense 'category' and find the specific policy rules associated with it (e.g., Meals vs. Software).
      2. **Constraint Check**:
         - Check if the amount exceeds the specific PHP thresholds for that category.
         - Check if required fields (like 'justification' for Software) are present AND relevant.
      3. **Cross-Category Rules**: Apply global rules (e.g., the 2,000 PHP travel/mobility review rule).
      4. **Fraud Heuristics**: Look for split-purchasing or duplicates.

      # Strict Constraints (Grounding Source)
      - MEALS: Max 500 PHP. No justification required if < 500 PHP.
      - SOFTWARE: MUST have a justification.
      - TRAVEL: > 2,000 PHP must be set to 'pending_review' status.
      - DOCUMENTATION: Claims > 1,000 PHP require an "Official Receipt" or "Sales Invoice".

      # Policy Enforcement Guidelines
      - Do NOT apply Software-specific rules to Meals or Supplies.
      - If an expense is under a category limit and meets standard reporting, its status is "approved".
      - Ambiguous justifications in non-mandatory categories (like Meals) should NOT trigger a violation.

      # Output Format
      Return ONLY a valid JSON object:
      {
        "status": "approved" | "pending_review" | "flagged",
        "audit_remarks": "Concise explanation of the decision, citing specific thresholds."
      }
    input: "Review this expense: {'merchant': 'Jollibee Foods Corporation', 'date': '2026-05-01', 'amount': 431.20, 'currency': 'PHP', 'category': 'Meals', 'justification': ''}"
    expected_output: |
      {"status": "approved", "audit_remarks": "Meal expense of PHP 431.20 is under the 500 PHP cap. No justification required per policy."}
    actual_output: null
    metrics: [factuality, format]
    tags: [approved, meals, within-limit]
    context:
      documents:
        - source: "SEIA-PH-2026-GROUNDED §1.1"
          content: "Meal Allowance Cap: 500 PHP hard threshold for all individual food/beverage claims"
        - source: "SEIA-PH-2026-GROUNDED §5"
          content: "Hard Constraints: Meal caps (500 PHP) and Travel review thresholds (2,000 PHP)."
    weight: 1.0

  - id: aud-002
    description: "Software missing justification — CloudSaaS, PHP 2,798.88 → flagged"
    system_prompt: *auditor_prompt
    input: "Review this expense: {'merchant': 'CloudSaaS Professional Services', 'date': '2026-05-02', 'amount': 2798.88, 'currency': 'PHP', 'category': 'Software', 'justification': ''}"
    expected_output: |
      {"status": "flagged", "audit_remarks": "Software expense of PHP 2,798.88 is missing the mandatory justification field. All SaaS and digital tool invoices must include a business justification per policy §1.1."}
    actual_output: null
    metrics: [factuality, format]
    tags: [flagged, software, missing-justification]
    context:
      documents:
        - source: "SEIA-PH-2026-GROUNDED §1.1"
          content: "Software Justification: All SaaS and digital tool invoices must include a mandatory 'justification' field. The agent must cross-verify against existing seat inventory."
    weight: 1.0

  - id: aud-003
    description: "Software with valid justification — AWS, USD 1,500.00, justification present → approved"
    system_prompt: *auditor_prompt
    input: "Review this expense: {'merchant': 'Amazon Web Services Inc.', 'date': '2026-05-10', 'amount': 1500.00, 'currency': 'USD', 'category': 'Software', 'justification': 'Production server hosting - Q2 infrastructure'}"
    expected_output: |
      {"status": "approved", "audit_remarks": "Software expense has a valid business justification. Meets policy requirements."}
    actual_output: null
    metrics: [factuality, format]
    tags: [approved, software, with-justification]
    context:
      documents:
        - source: "SEIA-PH-2026-GROUNDED §1.1"
          content: "Software Justification: All SaaS and digital tool invoices must include a mandatory 'justification' field. The agent must cross-verify against existing seat inventory."
    weight: 1.0

  - id: aud-004
    description: "Travel over 2,000 PHP — PAL, PHP 12,000.00 → pending_review"
    system_prompt: *auditor_prompt
    input: "Review this expense: {'merchant': 'Philippine Airlines', 'date': '2026-05-20', 'amount': 12000.00, 'currency': 'PHP', 'category': 'Travel', 'justification': ''}"
    expected_output: |
      {"status": "pending_review", "audit_remarks": "Travel expense of PHP 12,000.00 exceeds the 2,000 PHP review threshold. Flagged for pending_review as per policy §1.2."}
    actual_output: null
    metrics: [factuality, format]
    tags: [pending-review, travel, over-threshold]
    context:
      documents:
        - source: "SEIA-PH-2026-GROUNDED §1.2"
          content: "The 2,000 PHP Review Rule: Any mobility transaction (airfare, car rentals, inter-city transport) exceeding 2,000 PHP must be flagged with pending_review status."
        - source: "SEIA-PH-2026-GROUNDED §5"
          content: "Hard Constraints: Meal caps (500 PHP) and Travel review thresholds (2,000 PHP)."
    weight: 1.0

  - id: aud-005
    description: "Meals over 500 PHP cap — Max's, PHP 924.00, with justification → flagged (hard cap)"
    system_prompt: *auditor_prompt
    input: "Review this expense: {'merchant': \"Max's Restaurant\", 'date': '2026-05-15', 'amount': 924.00, 'currency': 'PHP', 'category': 'Meals', 'justification': 'Client lunch - Acme Corp onboarding'}"
    expected_output: |
      {"status": "flagged", "audit_remarks": "Meal expense of PHP 924.00 exceeds the 500 PHP hard cap per policy §1.1. Even with justification present, the amount exceeds the meal allowance limit."}
    actual_output: null
    metrics: [factuality, format]
    tags: [flagged, meals, over-limit, hard-cap]
    context:
      documents:
        - source: "SEIA-PH-2026-GROUNDED §1.1"
          content: "Meal Allowance Cap: 500 PHP hard threshold for all individual food/beverage claims"
        - source: "SEIA-PH-2026-GROUNDED §5"
          content: "Hard Constraints: Meal caps (500 PHP) and Travel review thresholds (2,000 PHP)."
    weight: 1.0
